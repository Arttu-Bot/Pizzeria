			<div class="tm-container-inner-2 tm-contact-section" id="NollaMargin">
					<div class="col-md-6">
						<form action="" method="POST" class="tm-contact-form">
							<div class="form-group">
									<label for="Tyytyväisyys">Kuinka tyytyväinen olet palveluihimme?</label>
									 <input type="radio" name="Tyytyväisyys" value="Tyytyväisyys1">
									 <label for="Tyytyväisyys1">1</label>
									 <input type="radio" name="Tyytyväisyys" value="Tyytyväisyys2">
									 <label for="Tyytyväisyys2">2</label>

									 <label for="Tyytyväisyys5">5</label>	
					        </div>

							<div class="form-group">
					          <input type="email" name="Sähköposti" class="form-control" placeholder="Sähköposti" required="" />
					        </div>
				
					        <div class="form-group">
					          <textarea rows="5" name="Viesti" class="form-control" placeholder="Kirjoita palautteesi tähän" required=""></textarea>
					        </div>
					
					        <div class="form-group tm-d-flex">
					          <button type="submit" class="tm-btn tm-btn-success tm-btn-right">
					            Lähetä
					          </button>
					        </div>
						</form>
					</div>

	<script src="js/parallax.min.js"></script>
	<script>
		$(document).ready(function(){
			var acc = document.getElementsByClassName("accordion");
			var i;
			
			for (i = 0; i < acc.length; i++) {
			  acc[i].addEventListener("click", function() {
			    this.classList.toggle("active");
			    var panel = this.nextElementSibling;
			    if (panel.style.maxHeight) {
			      panel.style.maxHeight = null;
			    } else {
			      panel.style.maxHeight = panel.scrollHeight + "px";
			    }
			  });
			}	
		});
	</script>
