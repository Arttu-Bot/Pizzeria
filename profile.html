<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Kervan pizzeria</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:400" rel="stylesheet" />    
	<link href="css/templatemo-style.css" rel="stylesheet" />

</head>

<body>
    
    <div class="container">
        <nav class="navbar">
            <div class="left">
                <img src="img/Kervan_Pizzeria_logo.png" alt="Logo" class="logo" />
            </div>

            <div class="right">
                <ul class="links">
                    <li><a href="index.html">Koti</a></li>
                    <li><a href="menu.html">Ruokalista</a></li>
                    <li><a href="about.html">Meistä</a></li>
                    <li><a href="contact.html">Ota Yhteyttä</a></li>
                </ul>
                <div class="nav-profile">
                    <a href="profile.html"> <img src="img/pizzeria_profiilikuva.png" class="profile-icon"></a>
                </div>
            </div>
        </nav>
    </div>

    
    <main>
        <header class="row tm-welcome-section">
				<h2 class="col-12 text-center tm-section-title">Tässä on profiilisi</h2>
				<p class="col-12 text-center">Täältä näet kaiken profiiliisi liittyvän</p>
        </header>

        <div class="profile">
            <form class="kirjautumis-lomake">
                <input class="nimi" type="text" placeholder="Syötä nimesi" value="" />
                <input class="salasana" type="text" placeholder="Anna salasana" value="" />
                <input class="kirjaudu_nappi" type="submit" value="Kirjaudu sisään" onClick="kirjaudu()" />
                <input class="kirjaudu-ulos-nappi" type="submit" value="Kirjaudu ulos" onClick="kirjaudu_ulos()" />
            </form>
        </div>

    </main>

    <footer class="tm-footer text-center">
        <p>Copyright &copy; 2020 Simple House 
        
        | Design: <a rel="nofollow" href="https://templatemo.com">TemplateMo</a></p>
    </footer>

    </div>
	<script src="js/jquery.min.js"></script>
	<script src="js/parallax.min.js"></script>
	<script>
		$(document).ready(function(){
			// Handle click on paging links
			$('.tm-paging-link').click(function(e){
				e.preventDefault();
				
				var page = $(this).text().toLowerCase();
				$('.tm-gallery-page').addClass('hidden');
				$('#tm-gallery-page-' + page).removeClass('hidden');
				$('.tm-paging-link').removeClass('active');
				$(this).addClass("active");
			});
		});
	</script>
	</div>
</body>
</html>
