<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Kervan Pizzeria - Ostoskori</title>
    <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400" rel="stylesheet" />
    <link href="css/all.min.css" rel="stylesheet" />
	<link href="css/templatemo-style.css" rel="stylesheet" />
</head>

<body>
    <div class="container">
    	<!-- Top box -->
		<!-- Logo & Site Name -->
		<nav class="navbar">
			<div class="left">
				<img src="img/Kervan_Pizzeria_logo.png" alt="Logo" class="logo" />
			</div>

			<div class="right">
				<ul class="links">
					<li><a href="index.html" class="highlight">Koti</a></li>
					<li><a href="menu.html" class="highlight">Ruokalista</a></li>
					<li><a href="fantasia.html" class="highlight">Fantasia</a></li>
					<li><a href="contact.html" class="highlight">Palaute</a></li>
				</ul>
				<div class="nav-profile">
					<a href="profile.html"> <img src="img/pizzeria_profiilikuva.png" class="profile-icon"></a>
				</div>
			</div>
		</nav>

        <main>
            <header class="row tm-welcome-section">
				<h2 class="col-12 text-center tm-section-title">Ostoskori</h2>
				<p class="col-12 text-center">Muokkaa ja vavhista tilauksesi</p>
			</header>
        

        <!-- Gallery -->
			<div class="row tm-gallery">
				<!-- gallery page 1 -->
				<div id="Muokkaus" class="center">
					<article class="col-lg-3 col-md-4 col-sm-6 col-12 tm-gallery-item">
						<h4 class="tm-gallery-title">Gluteeniton pohja</h4>
						<form class="row">
							<p class="tm-gallery-price">+ 2€</p>
							<input type="checkbox" class="checkbox">
						</form>
					</article>
				</div> <!-- gallery page 1 -->
            </div>
        </main>

        <footer class="tm-footer text-center">
			<p>Copyright &copy; 2020 Simple House 
            
            | Design: <a rel="nofollow" href="https://templatemo.com">TemplateMo</a></p>
		</footer>
	</div>
	<script src="js/jquery.min.js"></script>
	<script src="js/parallax.min.js"></script>
	<script>
		$(document).ready(function(){
			// Handle click on paging links
			$('.tm-paging-link').click(function(e){
				e.preventDefault();
				
				var page = $(this).text().toLowerCase();
				$('.tm-gallery-page').addClass('hidden');
				$('#tm-gallery-page-' + page).removeClass('hidden');
				$('.tm-paging-link').removeClass('active');
				$(this).addClass("active");
			});
		});
	</script>
	</div>
</body>
</html>
